services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskmanager_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: bash -c "bundle check || bundle install && bundle exec rails db:create db:migrate && bundle exec rails server -b 0.0.0.0"
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      DATABASE_URL: postgresql://postgres:password@db:5432/taskmanager_development
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: npm start -- --host 0.0.0.0 --poll 500
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
  bundle_cache:
  node_modules: